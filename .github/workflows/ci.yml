name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [debug, release]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssh-dev cppcheck

      - name: Build (${{ matrix.build_type }})
        run: make ${{ matrix.build_type }}

      - name: Run tests
        run: make test

      - name: Static analysis
        if: matrix.build_type == 'debug'
        run: make check || true

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ssh-proxy-core:ci .
