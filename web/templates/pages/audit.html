{{template "base" .}}

{{define "title"}}Audit Log{{end}}

{{define "page-title"}}Audit Log{{end}}

{{define "content"}}
<!-- Toolbar -->
<div class="toolbar">
    <div class="toolbar-left">
        <select class="form-control" id="audit-range" style="width:150px;" onchange="loadAudit()">
            <option value="1h">Last Hour</option>
            <option value="24h" selected>Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
            <option value="custom">Custom Range</option>
        </select>
        <input type="datetime-local" class="form-control hidden" id="audit-from" style="width:200px;" onchange="loadAudit()">
        <input type="datetime-local" class="form-control hidden" id="audit-to" style="width:200px;" onchange="loadAudit()">
        <div class="search-input">
            <input type="text" id="audit-search" placeholder="Search events…" oninput="loadAudit()">
        </div>
    </div>
    <div class="toolbar-right">
        <button class="btn btn-secondary btn-sm" onclick="exportAudit()">📥 Export CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="loadAudit()">↻ Refresh</button>
    </div>
</div>

<!-- Event Type Tabs -->
<div class="tabs" id="audit-tabs">
    <button class="tab-item active" data-event-type="" onclick="setEventType(this, '')">All</button>
    <button class="tab-item" data-event-type="auth" onclick="setEventType(this, 'auth')">Auth</button>
    <button class="tab-item" data-event-type="connect" onclick="setEventType(this, 'connect')">Connect</button>
    <button class="tab-item" data-event-type="command" onclick="setEventType(this, 'command')">Command</button>
    <button class="tab-item" data-event-type="transfer" onclick="setEventType(this, 'transfer')">Transfer</button>
    <button class="tab-item" data-event-type="admin" onclick="setEventType(this, 'admin')">Admin</button>
</div>

<!-- Audit Table -->
<div class="card">
    <div class="table-wrapper">
        <table id="audit-table">
            <thead>
                <tr>
                    <th style="width:30px;"></th>
                    <th class="sortable">Timestamp <span class="sort-icon">↕</span></th>
                    <th>Event Type</th>
                    <th class="sortable">User <span class="sort-icon">↕</span></th>
                    <th>Source IP</th>
                    <th>Target</th>
                    <th>Details</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="audit-body">
                <tr><td colspan="8" class="table-empty">
                    <div class="skeleton skeleton-row"></div>
                    <div class="skeleton skeleton-row"></div>
                    <div class="skeleton skeleton-row"></div>
                </td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination -->
<div class="pagination" id="audit-pagination"></div>
{{end}}

{{define "scripts"}}
<script>
(function() {
    var currentEventType = '';
    var currentPage = 1;
    var perPage = 50;

    // Show/hide custom date fields
    document.getElementById('audit-range').addEventListener('change', function() {
        var isCustom = this.value === 'custom';
        document.getElementById('audit-from').classList.toggle('hidden', !isCustom);
        document.getElementById('audit-to').classList.toggle('hidden', !isCustom);
    });

    window.setEventType = function(btn, type) {
        currentEventType = type;
        currentPage = 1;
        App.qsa('#audit-tabs .tab-item').forEach(function(t) { t.classList.remove('active'); });
        btn.classList.add('active');
        loadAudit();
    };

    window.loadAudit = function(page) {
        currentPage = page || currentPage || 1;
        var params = new URLSearchParams();
        params.set('page', currentPage);
        params.set('per_page', perPage);
        params.set('sort', 'timestamp');
        params.set('order', 'desc');

        if (currentEventType) params.set('event_type', currentEventType);

        var search = document.getElementById('audit-search').value.trim();
        if (search) params.set('q', search);

        var range = document.getElementById('audit-range').value;
        if (range !== 'custom') {
            var now = new Date();
            var from = new Date();
            if (range === '1h') from.setHours(now.getHours() - 1);
            else if (range === '24h') from.setDate(now.getDate() - 1);
            else if (range === '7d') from.setDate(now.getDate() - 7);
            else if (range === '30d') from.setDate(now.getDate() - 30);
            params.set('from', from.toISOString());
            params.set('to', now.toISOString());
        } else {
            var fromVal = document.getElementById('audit-from').value;
            var toVal = document.getElementById('audit-to').value;
            if (fromVal) params.set('from', new Date(fromVal).toISOString());
            if (toVal) params.set('to', new Date(toVal).toISOString());
        }

        App.api('GET', '/api/v1/audit?' + params.toString()).then(function(data) {
            var tbody = document.getElementById('audit-body');
            var items = data.events || data.items || data || [];
            var total = data.total || items.length;

            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="table-empty"><div class="table-empty-icon">📋</div>No events found</td></tr>';
                document.getElementById('audit-pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = items.map(function(ev, idx) {
                var typeCls = 'badge-neutral';
                if ((ev.event_type || '').startsWith('auth.failure')) typeCls = 'badge-danger';
                else if ((ev.event_type || '').startsWith('auth')) typeCls = 'badge-primary';
                else if ((ev.event_type || '').startsWith('connect') || (ev.event_type || '').startsWith('session')) typeCls = 'badge-success';
                else if ((ev.event_type || '').startsWith('command')) typeCls = 'badge-warning';
                else if ((ev.event_type || '').startsWith('transfer')) typeCls = 'badge-info';

                var detail = App.escapeHtml((ev.details || ev.message || '').substring(0, 80));
                if ((ev.details || ev.message || '').length > 80) detail += '…';

                var actions = '<button class="btn btn-ghost btn-sm" onclick="toggleDetail(' + idx + ')" title="Expand">▶</button>';
                if (ev.session_id && ev.recording_url) {
                    actions += ' <a href="' + App.escapeHtml(ev.recording_url) + '" class="btn btn-ghost btn-sm" title="Playback">▶️</a>';
                }

                return '<tr class="expandable-row" data-idx="' + idx + '">' +
                    '<td><span class="expand-icon" id="expand-icon-' + idx + '">▶</span></td>' +
                    '<td>' + App.formatTime(ev.timestamp) + '</td>' +
                    '<td><span class="badge ' + typeCls + '">' + App.escapeHtml(ev.event_type || ev.type || '—') + '</span></td>' +
                    '<td>' + App.escapeHtml(ev.user || '—') + '</td>' +
                    '<td>' + App.escapeHtml(ev.source_ip || ev.client_ip || '—') + '</td>' +
                    '<td>' + App.escapeHtml(ev.target || '—') + '</td>' +
                    '<td class="text-muted">' + detail + '</td>' +
                    '<td class="col-actions">' + actions + '</td>' +
                    '</tr>' +
                    '<tr class="expandable-detail" id="detail-' + idx + '">' +
                    '<td colspan="8"><pre style="white-space:pre-wrap;font-size:12px;margin:0;">' +
                        App.escapeHtml(JSON.stringify(ev, null, 2)) + '</pre></td></tr>';
            }).join('');

            // Pagination
            var totalPages = Math.ceil(total / perPage);
            if (totalPages > 1) {
                var pagHtml = '';
                pagHtml += '<button class="pagination-btn" onclick="loadAudit(1)" ' + (currentPage <= 1 ? 'disabled' : '') + '>«</button>';
                pagHtml += '<button class="pagination-btn" onclick="loadAudit(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>‹</button>';
                for (var p = Math.max(1, currentPage - 2); p <= Math.min(totalPages, currentPage + 2); p++) {
                    pagHtml += '<button class="pagination-btn ' + (p === currentPage ? 'active' : '') + '" onclick="loadAudit(' + p + ')">' + p + '</button>';
                }
                pagHtml += '<button class="pagination-btn" onclick="loadAudit(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>›</button>';
                pagHtml += '<button class="pagination-btn" onclick="loadAudit(' + totalPages + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>»</button>';
                document.getElementById('audit-pagination').innerHTML = pagHtml;
            } else {
                document.getElementById('audit-pagination').innerHTML = '';
            }

            App.table('#audit-table');
        }).catch(function(e) {
            document.getElementById('audit-body').innerHTML =
                '<tr><td colspan="8" class="table-empty">Failed to load: ' + App.escapeHtml(e.message) + '</td></tr>';
        });
    };

    window.toggleDetail = function(idx) {
        var row = document.getElementById('detail-' + idx);
        var icon = document.getElementById('expand-icon-' + idx);
        if (row) {
            row.classList.toggle('show');
            icon.textContent = row.classList.contains('show') ? '▼' : '▶';
        }
    };

    window.exportAudit = function() {
        var params = new URLSearchParams(window.location.search);
        params.set('format', 'csv');
        window.location.href = '/api/v1/audit/export?' + params.toString();
    };

    loadAudit();
})();
</script>
{{end}}
