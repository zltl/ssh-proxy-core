# SSH Proxy Core - Test Configuration
# Used by: make run

[server]
bind_addr = 0.0.0.0
port = 2222
host_key = /tmp/ssh_proxy_host_key
# banner = /etc/ssh-proxy/banner.txt         # Pre-auth banner file
# motd = Welcome, {username}! Connected from {client_ip}  # Post-auth MOTD
show_progress = true              # Show connection progress to client

[logging]
level = debug
audit_dir = /tmp/ssh_proxy_audit
audit_max_file_size = 104857600        # Rotate + archive after 100 MiB (0 disables)
audit_max_archived_files = 30          # Keep at most 30 archived files per audit family (0 disables)
audit_retention_days = 90              # Remove archived audit logs older than 90 days (0 disables)
# audit_encryption_key = 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
# audit_encryption_key_file = /etc/ssh-proxy/audit_aes256.key
# When configured, each audit/event command log line is wrapped with AES-256-GCM.
format = text                       # text | json (NDJSON format)

[limits]
max_sessions = 100
session_timeout = 3600
auth_timeout = 60
per_user_max_sessions = 10          # Max concurrent sessions per user

# ============ IP Access Control ============
[ip_acl]
mode = blacklist                    # whitelist | blacklist
rules = 127.0.0.0/8:allow, 10.0.0.0/8:allow, 0.0.0.0/0:allow
log_rejections = true               # Log denied connections

# Test user - password is "test123"
# Generate with: openssl passwd -6 -salt saltsalt 'test123'
# Sensitive values can also be stored as enc:v1:<nonce_hex>:<ciphertext_hex>:<tag_hex>
# after configuring [security] master_key or master_key_file.
[user:test]
password_hash = $6$saltsalt$U5d2t4MFT.Hn/auqLjcfU6R/lm2Y71FvBwABEOht/UpRtNzcFvzGl/oU6V38pYgY8ZpicOa.0ESff5jRNylZM.
password_changed_at = 1735689600    # Unix epoch seconds; required for expiry enforcement
enabled = true

[user:admin]
password_hash = $6$saltsalt$U5d2t4MFT.Hn/auqLjcfU6R/lm2Y71FvBwABEOht/UpRtNzcFvzGl/oU6V38pYgY8ZpicOa.0ESff5jRNylZM.
password_changed_at = 1735689600
enabled = true
# password_change_required = true    # Force rotation before next password login
# totp_secret = JBSWY3DPEHPK3PXP  # Base32-encoded TOTP secret
# mfa_enabled = true                # Enable MFA for this user

# ============ Authentication Backend ============
[auth]
backend = local                     # local | ldap
# LDAP settings (when backend = ldap)
# ldap_uri = ldap://ldap-a.example.com:389,ldap://ldap-b.example.com:389
# ldap_base_dn = dc=example,dc=com
# ldap_bind_dn = cn=admin,dc=example,dc=com
# ldap_bind_pw = ${env:LDAP_BIND_PASSWORD}
# ldap_user_filter = (uid=%s)
# ldap_timeout = 5
# Multiple URIs enable failover; the last successful endpoint is preferred first.
# ldap_group_attr = memberOf
# ldap_email_attr = mail
# ldap_department_attr = department
# ldap_manager_attr = manager
# Successful LDAP password auth can also hydrate group/email/department/manager metadata.

# ============ Security Policies ============
[security]
# master_key = ${env:SSH_PROXY_MASTER_KEY}    # 64 hex chars; decrypts enc:v1 protected config values
# master_key_file = /etc/ssh-proxy/master_key.hex
lockout_enabled = true              # Lock account after repeated failures
lockout_threshold = 5               # Failed attempts before lockout
lockout_duration = 300              # Lockout duration in seconds
ip_ban_enabled = true               # Temporarily ban client IP after repeated failures
ip_ban_threshold = 10               # Failed attempts before client IP ban
ip_ban_duration = 900               # Client IP ban duration in seconds
password_min_length = 12            # Minimum password length
password_require_uppercase = true
password_require_lowercase = true
password_require_digit = true
password_require_special = false
password_max_age_days = 90          # Expire passwords after N days (0 disables)
# trusted_user_ca_key = ssh-ed25519 AAAA... ssh-ca@example
# trusted_user_ca_keys_file = /etc/ssh-proxy/trusted_user_ca_keys.pub
# revoked_user_cert_serial = 1001
# revoked_user_cert_serials_file = /etc/ssh-proxy/revoked_user_cert_serials.txt
# SSH certificates signed by these CAs are accepted for configured users.
# source-address critical options are enforced; unsupported critical options are rejected.
# Revoked certificate serials are denied after CA signature verification succeeds.

# ============ MFA / Two-Factor Authentication ============
[mfa]
enabled = false                     # Enable TOTP-based MFA
issuer = SSH-Proxy                  # TOTP issuer name
time_step = 30                      # TOTP time step (seconds)
digits = 6                          # TOTP code length
window = 1                          # Time window tolerance (±steps)

# Routes - map users to upstream servers
[route:admin]
upstream = 127.0.0.1
port = 22
user = ubuntu
privkey = ~/.ssh/id_rsa
# country_code = US                  # Optional Geo-routing metadata
# region = California
# city = San Francisco
# latitude = 37.7749
# longitude = -122.4194

[route:test]
upstream = 127.0.0.1
port = 22
user = ubuntu

# Default route
[route:*]
upstream = 127.0.0.1
port = 22
user = ubuntu

# Optional source classification and Geo-routing database.
# Define multiple matching [route:<pattern>] sections with different
# country_code/region/city/latitude/longitude values to route users to the
# nearest upstream based on their client IP lookup in geoip_data_file.
# If multiple best candidates remain, the proxy keeps same-user affinity stable.
[network_sources]
# office_cidrs = 10.0.0.0/8,192.168.0.0/16
# vpn_cidrs = 100.64.0.0/10
# geoip_data_file = /etc/ssh-proxy/geoip.json

# ============ Router / Upstream Settings ============
[router]
retry_max = 3                       # Max retry attempts on connection failure
retry_initial_delay_ms = 100        # Initial retry delay (milliseconds)
retry_max_delay_ms = 5000           # Maximum retry delay
retry_backoff_factor = 2.0          # Exponential backoff multiplier
circuit_breaker_enabled = true      # Skip routes that keep failing upstream TCP connect
circuit_breaker_failure_threshold = 3
circuit_breaker_open_seconds = 30
pool_enabled = false                # Enable upstream connection pooling
pool_max_idle = 10                  # Max idle connections per upstream
pool_max_idle_time = 300            # Idle connection timeout (seconds)

# ============ Feature Policy Control ============
# Controls what SSH features users can use
# Format: [policy:user] or [policy:user@upstream]

# Admin - allow all features
[policy:admin]
allow = all

# Test user - allow most features, deny port forwarding
[policy:test]
allow = shell, exec, scp, sftp, git
deny = port_forward, x11, agent

# Default policy - basic shell and file transfer
[policy:*]
allow = shell, exec, download, sftp_list
deny = upload, port_forward, git_push

# ============ Per-Upstream Policies ============
# More specific policies for certain upstream servers

# Any user accessing localhost - allow upload (for testing)
[policy:*@127.0.0.1]
allow = all

# ============ Admin REST API ============
[admin]
enabled = false                     # Admin API requires TLS and will stay off by default
# auth_token = hmac:change-me       # Or jwt:change-me / a plain bearer token string / enc:v1:...
# token_expiry = 3600               # Signed token expiry in seconds
# tls_enabled = true                # Enable HTTPS for the admin API
# tls_cert = /etc/ssh-proxy/cert.pem
# tls_key = /etc/ssh-proxy/key.pem
# Endpoints: /api/v1/sessions, /api/v1/upstreams, /api/v1/reload,
#            /api/v1/config, POST /api/v1/token (HMAC/JWT modes)

# ============ Webhook Notifications ============
[webhook]
enabled = false                     # Enable event webhooks
# url = https://hooks.example.com/ssh-events
# auth_header = Authorization: Bearer xxx
# hmac_secret = ${env:SSH_PROXY_WEBHOOK_SECRET}   # Or enc:v1:...
# dead_letter_path = /var/log/ssh-proxy/webhook-dlq.jsonl   # default: <audit_dir>/webhook-dlq.jsonl
# events = auth.success, auth.failure, session.start, session.end, rate_limit.triggered, user.updated, policy.updated, config.reloaded
# retry_max = 3
# retry_delay_ms = 1000
# timeout_ms = 5000
# queue_size = 1024

# ============ Distributed Session Storage ============
[session_store]
type = local                        # local | file
# path = /shared/ssh-proxy/sessions # File store path (when type = file)
# sync_interval = 5                 # Sync interval in seconds
# instance_id = node-1              # Instance identifier
