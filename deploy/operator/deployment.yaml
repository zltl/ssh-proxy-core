apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-proxy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ssh-proxy-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ssh-proxy-operator
    spec:
      serviceAccountName: ssh-proxy-operator
      containers:
        - name: operator
          image: ghcr.io/ssh-proxy-core/ssh-proxy-core-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-namespace"
            - "default"
            - "-reconcile-interval"
            - "30s"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
