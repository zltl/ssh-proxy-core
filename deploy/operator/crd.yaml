apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshproxyclusters.proxy.sshproxy.io
spec:
  group: proxy.sshproxy.io
  scope: Namespaced
  names:
    plural: sshproxyclusters
    singular: sshproxycluster
    kind: SSHProxyCluster
    shortNames:
      - spc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - config
              properties:
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                    pullPolicy:
                      type: string
                controlPlane:
                  type: object
                  properties:
                    replicas:
                      type: integer
                    port:
                      type: integer
                dataPlane:
                  type: object
                  properties:
                    replicas:
                      type: integer
                    port:
                      type: integer
                service:
                  type: object
                  properties:
                    type:
                      type: string
                    sshPort:
                      type: integer
                    httpPort:
                      type: integer
                persistence:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    size:
                      type: string
                    accessMode:
                      type: string
                    storageClassName:
                      type: string
                config:
                  type: object
                  required:
                    - controlPlaneJSON
                    - dataPlaneINI
                  properties:
                    controlPlaneJSON:
                      type: string
                    dataPlaneINI:
                      type: string
                secrets:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                phase:
                  type: string
                message:
                  type: string
                lastReconciledAt:
                  type: string
                  format: date-time
                resourceNames:
                  type: object
                  additionalProperties:
                    type: string
