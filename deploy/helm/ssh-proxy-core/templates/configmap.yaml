apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ssh-proxy-core.fullname" . }}-config
  labels:
    {{- include "ssh-proxy-core.labels" . | nindent 4 }}
data:
  config.ini: |
    [server]
    bind_addr = 0.0.0.0
    port = {{ .Values.dataPlane.port }}
    host_key = /data/host_key
    show_progress = true

    [logging]
    level = {{ .Values.config.logLevel }}
    audit_dir = /data/audit
    format = json

    [limits]
    max_sessions = 100
    session_timeout = 3600
    auth_timeout = 60
    per_user_max_sessions = 10

    [ip_acl]
    mode = blacklist
    rules = 0.0.0.0/0:allow
    log_rejections = true

    [auth]
    {{- if .Values.config.ldap.enabled }}
    backend = ldap
    ldap_uri = {{ .Values.config.ldap.uri }}
    {{- else }}
    backend = local
    {{- end }}

    [mfa]
    {{- if .Values.config.oidc.enabled }}
    enabled = true
    {{- else }}
    enabled = false
    {{- end }}
    issuer = SSH-Proxy
    time_step = 30
    digits = 6
    window = 1

    [router]
    retry_max = 3
    retry_initial_delay_ms = 100
    retry_max_delay_ms = 5000
    retry_backoff_factor = 2.0

    [policy:*]
    allow = shell, exec, scp, sftp
    deny = port_forward, x11

    [admin]
    enabled = true
    {{- if .Values.config.auditEnabled }}

    [webhook]
    enabled = false
    {{- end }}

    [session_store]
    type = local
